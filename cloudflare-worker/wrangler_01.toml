name = "password-rotator"
main = "src/index.ts"
compatibility_date = "2024-03-20"

# 매월 1일 자정(UTC 기준)에 실행
[triggers]
crons = ["0 0 1 * *"]

# 일반 환경 변수 (비밀키가 아닌 값들)
[vars]
# FIREBASE_PROJECT_ID = "gen-lang-client-0979707528"
# SENDER_EMAIL = "aimaster1004@gmail.com"
# ADMIN_EMAIL = "aimaster1004@gmail.com"

# 주의: 비밀키(Secret)는 이 파일에 적지 마세요.
# Cloudflare 대시보드나 아래 명령어를 통해 등록해야 합니다.
# npx wrangler secret put FIREBASE_WEB_API_KEY
# npx wrangler secret put ADMIN_PASSWORD
# npx wrangler secret put RESEND_API_KEY
